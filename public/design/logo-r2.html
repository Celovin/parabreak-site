<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>parabreak — logo r2 · refinement</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0A0B0F;
    --bg-2: #0F1116;
    --panel: #151821;
    --line: #1E2230;
    --line-2: #2A2F40;
    --ink: #E6E8EF;
    --ink-2: #B4B8C5;
    --mute: #6B7080;
    --mute-2: #4A4F60;
    --green: #46E49E;
    --green-dim: #2A8F62;
    --red: #E44C4C;
    --amber: #F2B544;
    --violet: #8B5CF6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #07080B; color: var(--ink); font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* ------- Logo card chrome ------- */
  .lg-card {
    width: 720px;
    height: 420px;
    background: var(--bg);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-rows: 28px 1fr 56px;
  }
  .lg-card .topbar {
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    color: var(--mute);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .lg-card .topbar .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 6px var(--green); }
  .lg-card .topbar .name { color: var(--ink-2); }
  .lg-card .topbar .meta { margin-left: auto; color: var(--mute-2); }
  .lg-card .stage {
    display: grid;
    place-items: center;
    position: relative;
    padding: 24px;
  }
  .lg-card .footer {
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    padding: 0 16px;
    color: var(--mute);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .lg-card .footer .b { color: var(--ink-2); }
  .lg-card .footer .c { text-align: center; }
  .lg-card .footer .r { text-align: right; }

  /* CRT scanline overlay — VERY subtle */
  .lg-card .stage::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.012) 0 1px,
      transparent 1px 3px
    );
    pointer-events: none;
  }
  .lg-card .stage::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
  }

  /* Grid backdrop */
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(70, 228, 158, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(70, 228, 158, 0.04) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: -1px -1px;
  }

  /* ============ LOGO 1 — bracket-break wordmark ============ */
  .l1 .word {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 96px;
    letter-spacing: -0.04em;
    color: var(--ink);
    position: relative;
    line-height: 1;
    display: inline-flex;
    align-items: baseline;
  }
  .l1 .word .para { color: var(--ink); }
  .l1 .word .br {
    color: var(--green);
    position: relative;
    display: inline-block;
    transform: translateY(-12px) rotate(-2deg);
    margin-left: 2px;
  }
  .l1 .word .br::before {
    content: "";
    position: absolute;
    left: -8px; right: -4px;
    top: 50%;
    height: 2px;
    background: var(--green);
    transform: translateY(-1px);
    box-shadow: 0 0 8px rgba(70,228,158,0.5);
  }
  .l1 .tag {
    margin-top: 18px;
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
  }

  /* ============ LOGO 2 — self-edit wordmark ============ */
  .l2 .word {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 88px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
    position: relative;
  }
  .l2 .word .strike {
    position: relative;
    color: var(--mute);
  }
  .l2 .word .strike::before {
    content: "";
    position: absolute;
    left: -2px; right: -2px;
    top: 52%;
    height: 3px;
    background: var(--red);
    transform: translateY(-1px);
  }
  .l2 .word .new {
    color: var(--green);
    margin-left: 4px;
  }
  .l2 .caret {
    display: inline-block;
    width: 10px;
    height: 80px;
    background: var(--green);
    margin-left: 6px;
    vertical-align: -10px;
    animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .l2 .tag {
    margin-top: 18px;
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ============ LOGO 3 — terminal cursor wordmark ============ */
  .l3 .row {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 84px;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--green);
    text-shadow:
      0 0 1px rgba(70, 228, 158, 0.6),
      0 0 8px rgba(70, 228, 158, 0.18);
    display: flex;
    align-items: center;
  }
  .l3 .row .prompt {
    color: var(--mute);
    margin-right: 14px;
    font-weight: 400;
  }
  .l3 .cur {
    display: inline-block;
    width: 14px;
    height: 14px;
    background: var(--green);
    margin-left: 8px;
    box-shadow: 0 0 10px rgba(70,228,158,0.6);
    animation: blink 1.05s steps(1) infinite;
  }
  .l3 .tag {
    margin-top: 22px;
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
  }

  /* ============ LOGO 4 — broken-frame mark ============ */
  .l4 .lockup {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .l4 .mark {
    width: 110px;
    height: 110px;
    position: relative;
  }
  .l4 .word {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 76px;
    letter-spacing: -0.03em;
    color: var(--ink);
    line-height: 1;
  }
  .l4 .word .accent { color: var(--green); }
  .l4 .sub {
    font-family: 'JetBrains Mono', monospace;
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* ============ LOGO 5 — speech-bubble-back mark ============ */
  .l5 .lockup {
    display: flex;
    align-items: center;
    gap: 26px;
  }
  .l5 .mark {
    width: 116px;
    height: 116px;
    position: relative;
  }
  .l5 .word {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 70px;
    letter-spacing: -0.04em;
    color: var(--ink);
    line-height: 1;
  }
  .l5 .word .br { color: var(--green); }
  .l5 .sub {
    font-family: 'JetBrains Mono', monospace;
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* ===== Variation row ===== */
  .var-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    height: 100%;
  }
  .var-cell {
    border-right: 1px solid var(--line);
    display: grid;
    place-items: center;
    padding: 24px;
    position: relative;
  }
  .var-cell:last-child { border-right: none; }
  .var-cell .var-label {
    position: absolute;
    top: 10px; left: 12px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mute-2);
  }
  .var-cell.light { background: #F4F4EE; color: #0A0B0F; }
  .var-cell.light .var-label { color: #8a8a85; }

  /* small variant: monochrome wordmark */
  .v-mono { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 28px; letter-spacing: -0.03em; }
  .v-mono.dark { color: var(--ink); }
  .v-mono.dark .br { color: var(--green); }
  .v-mono.light { color: #0A0B0F; }
  .v-mono.light .br { color: #0A0B0F; }
  .v-mono .br { display: inline-block; }

  /* App icon pill */
  .v-app {
    width: 56px; height: 56px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    display: grid;
    place-items: center;
    color: var(--green);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.04em;
  }
  .v-app.light { background: #F4F4EE; border-color: #d8d8d0; color: #0A0B0F; }

  /* ============ Variation rows specific ============ */
  .l1 .var-cell .v-mono.dark .br {
    transform: translateY(-3px) rotate(-2deg);
    margin-left: 1px;
  }
  .l1 .var-cell .v-mono.dark .br::before {
    content: "";
    display: inline-block;
    width: 0;
  }

  .vp-1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.03em;
    display: inline-flex;
    align-items: baseline;
  }
  .vp-1 .br {
    display: inline-block;
    transform: translateY(-3px) rotate(-2deg);
    margin-left: 1px;
    position: relative;
  }
  .vp-1.dark { color: var(--ink); }
  .vp-1.dark .br { color: var(--green); }
  .vp-1.dark .br::before {
    content: "";
    position: absolute;
    left: -3px; right: -1px; top: 50%;
    height: 1px; background: var(--green);
  }
  .vp-1.light { color: #0A0B0F; }
  .vp-1.light .br { color: #0A0B0F; }
  .vp-1.light .br::before {
    content: "";
    position: absolute;
    left: -3px; right: -1px; top: 50%;
    height: 1px; background: #0A0B0F;
  }

  .vp-2 {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.02em;
  }
  .vp-2.dark { color: var(--ink); }
  .vp-2.dark .new { color: var(--green); }
  .vp-2.light { color: #0A0B0F; }
  .vp-2.light .new { color: #0A0B0F; text-decoration: underline; text-decoration-thickness: 2px; }
  .vp-2 .strike {
    color: var(--mute);
    position: relative;
  }
  .vp-2 .strike::before {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 52%;
    height: 1.5px;
    background: var(--red);
  }
  .vp-2.light .strike { color: #6B7080; }
  .vp-2.light .strike::before { background: #0A0B0F; }

  .vp-3 {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 24px;
    letter-spacing: -0.04em;
  }
  .vp-3.dark { color: var(--green); }
  .vp-3.light { color: #0A0B0F; }
  .vp-3 .prompt { opacity: 0.6; margin-right: 4px; }

  .vp-4 {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.03em;
  }
  .vp-4.dark { color: var(--ink); }
  .vp-4.dark .accent { color: var(--green); }
  .vp-4.light { color: #0A0B0F; }
  .vp-4.light .accent { color: #0A0B0F; }

  .vp-5 {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 24px;
    letter-spacing: -0.04em;
  }
  .vp-5.dark { color: var(--ink); }
  .vp-5.dark .br { color: var(--green); }
  .vp-5.light { color: #0A0B0F; }
  .vp-5.light .br { color: #0A0B0F; }

  /* Construction grid card */
  .construct {
    width: 720px;
    height: 480px;
    background: var(--bg);
    border: 1px solid var(--line);
    overflow: hidden;
    display: grid;
    grid-template-rows: 28px 1fr;
    position: relative;
  }
  .construct .topbar {
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px;
    color: var(--mute);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .construct .topbar .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }
  .construct .stage {
    position: relative;
    display: grid;
    place-items: center;
    padding: 32px;
  }
  .construct .stage::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(70, 228, 158, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(70, 228, 158, 0.06) 1px, transparent 1px);
    background-size: 16px 16px;
  }
  .construct svg { position: relative; z-index: 1; }

  /* R2 — angle compare grid */
  .angle-grid {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }
  .angle-cell {
    border-right: 1px solid var(--line);
    display: grid;
    grid-template-rows: 1fr auto;
    align-items: center;
    justify-items: center;
    padding: 18px 12px 14px;
    position: relative;
  }
  .angle-cell:last-child { border-right: none; }
  .angle-cell .lab {
    position: absolute;
    top: 10px; left: 12px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mute-2);
  }
  .angle-cell .star {
    position: absolute;
    top: 10px; right: 12px;
    color: var(--green);
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .angle-cell .meta-row {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--mute);
    margin-top: 14px;
    text-align: center;
    line-height: 1.5;
  }
  .angle-cell .meta-row b { color: var(--ink-2); font-weight: 500; }

  /* Lockup variants */
  .lockup-card {
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: 1fr auto;
    align-items: center;
    padding: 32px;
    position: relative;
  }
  .lockup-card .meta {
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--mute);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .lockup-card .meta b { color: var(--ink-2); font-weight: 500; }
  .lockup-card .meta .c { text-align: center; }
  .lockup-card .meta .r { text-align: right; }

  /* hybrid wordmark — 01 style applied to 04 lockup */
  .hybrid-word {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--ink);
    display: inline-flex;
    align-items: baseline;
  }
  .hybrid-word .br {
    color: var(--green);
    display: inline-block;
    transform: translateY(-0.13em) rotate(-3deg);
    margin-left: 0.02em;
    position: relative;
  }
  .hybrid-word .br::before {
    content: "";
    position: absolute;
    left: -0.08em; right: -0.04em;
    top: 50%;
    height: 0.04em;
    background: var(--green);
    transform: translateY(-1px);
  }

  /* Sticker — for the cut wordmark, repurposed */
  .sticker-grid {
    width: 100%; height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .sticker-cell {
    border-right: 1px solid var(--line);
    display: grid;
    place-items: center;
    padding: 24px;
    position: relative;
  }
  .sticker-cell:last-child { border-right: none; }
  .sticker-cell .lab {
    position: absolute;
    top: 10px; left: 12px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mute-2);
  }
  .sticker {
    border: 1px solid var(--line-2);
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .sticker .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }
  .sticker.divider {
    border: none;
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.3em;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 80%;
  }
  .sticker.divider .line { flex: 1; height: 1px; background: var(--line-2); }
  .sticker.divider .line.acc { background: var(--green); flex: 0 0 24px; }

  /* Notes panel */
  .notes {
    width: 360px;
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 24px 24px 28px;
    color: var(--ink-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
  }
  .notes h3 {
    color: var(--green);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin: 0 0 14px;
    font-weight: 500;
  }
  .notes h2 {
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  .notes .sub {
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .notes .row { display: flex; gap: 10px; margin-bottom: 6px; }
  .notes .row .k { color: var(--mute); width: 76px; flex-shrink: 0; font-size: 11px; }
  .notes .row .v { color: var(--ink-2); }
  .notes .row .v.green { color: var(--green); }
  .notes hr { border: none; border-top: 1px solid var(--line); margin: 16px 0; }
  .notes ul { margin: 0; padding-left: 16px; }
  .notes li { margin-bottom: 4px; }

</style>
</head>
<body>

<!-- Mount point for design canvas -->
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logo-r2-app.jsx"></script>
